services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexura
      POSTGRES_USER: nexura
      POSTGRES_PASSWORD: nexura
    ports:
      - '5432:5432'
    volumes:
      - nexura-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexura -d nexura']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nexura-postgres:
